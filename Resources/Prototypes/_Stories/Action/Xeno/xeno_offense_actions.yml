- type: entity
  id: ActionXenoScissorCut
  parent: ActionXenoBase
  name: Scissor Cut (25)
  description: Slash a 1x4 line on the tile you click on damaging anyone from you to the end of the line for 45 damage. If you are super empowered whoever hit will be super slowed for 3 seconds as well.
  components:
  - type: WorldTargetAction
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: rav_scissor_cut
    event: !type:XenoScissorsCutActionEvent
    range: 15
    useDelay: 6
    checkCanAccess: false

- type: entity
  id: ActionXenoRavageCharge
  parent: ActionXenoBase
  name: Ravage Pounce (25)
  description: Lunge 5 tiles in the direction you selected. [color=green] If you are super empowered and charged into an enemy they will be knocked down for 2 seconds and slashed. Slashing a target will reduce this ability's cooldown by 4 seconds.[/color]
  components:
  - type: WorldTargetAction
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    event: !type:XenoRavageChargeActionEvent
    range: 15
    useDelay: 14
    checkCanAccess: false
